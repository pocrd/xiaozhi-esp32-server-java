services:

  node:
    build:
      context: ./web
      dockerfile: ../Dockerfile-node
    ports:
      - "8084:8084"
    networks:
      - app-network
    environment:
      - API_URL=http://server:8091

  server:
    build:
      context: .
      dockerfile: Dockerfile-server
      target: server
      args:
        - VOSK_MODEL_SIZE=${VOSK_MODEL_SIZE:-small}
        - TTS_MODEL=${TTS_MODEL:none}
        - DOWNLOAD_PROXY=${BUILD_PROXY:-}
      # 添加构建缓存设置
      cache_from:
        - eclipse-temurin:21-jre
    ports:
      - "8091:8091"
    networks:
      - app-network
    environment:
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATASOURCE_URL=jdbc:mysql://rm-bp1i047rt28fajm69.mysql.rds.aliyuncs.com/xiaozhi?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=mcgo
      - SPRING_DATASOURCE_PASSWORD=ukj5eWLVVp79MqK
      - HOST_IP=${HOST_IP:-}
    restart: always  # 自动重启
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  dialogue:
    build:
      context: .
      dockerfile: Dockerfile-server
      target: dialogue
      args:
        - VOSK_MODEL_SIZE=${VOSK_MODEL_SIZE:-small}
        - TTS_MODEL=${TTS_MODEL:none}
        - DOWNLOAD_PROXY=${BUILD_PROXY:-}
      cache_from:
        - eclipse-temurin:21-jre
    ports:
      - "8092:8092"
    networks:
      - app-network
    environment:
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATASOURCE_URL=jdbc:mysql://rm-bp1i047rt28fajm69.mysql.rds.aliyuncs.com/xiaozhi?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=mcgo
      - SPRING_DATASOURCE_PASSWORD=ukj5eWLVVp79MqK
      - HOST_IP=${HOST_IP:-}
    restart: always
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: always
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - app-network
      - xiaozhi-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

networks:
  app-network:
    driver: bridge
  xiaozhi-network:
    driver: bridge
    name: xiaozhi-network

volumes:
  redis_data:  # 持久化Redis数据
