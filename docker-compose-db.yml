# 仅数据库服务 - MySQL, Redis
# 适用于“服务本机运行，数据库容器运行”的开发方式
# 使用方式: docker compose -f docker-compose-db.yml up -d

services:
  redis:
    image: redis:7-alpine
    container_name: xiaozhi-redis
    restart: always
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - db-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

networks:
  db-network:
    driver: bridge

volumes:
  redis_data:
